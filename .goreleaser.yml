version: 2

project_name: riff

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: riff
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: torryt
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/torryt/riff"
    description: "Disposable, throwaway project workspaces"
    license: "MIT"
    install: |
      bin.install "riff"
    test: |
      system "#{bin}/riff", "version"

release:
  github:
    owner: torryt
    name: riff
